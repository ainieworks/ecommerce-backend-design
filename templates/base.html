{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopNow{% endblock %}</title>
    <!-- Internal CSS — we'll move to external file later -->
    <style>
        /* Reset default browser styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
        }

        /* ── NAVBAR ── */
        nav {
            background-color: #ffffff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .nav-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        /* ── FOOTER ── */
        footer {
            background-color: #1e293b;
            color: #94a3b8;
            text-align: center;
            padding: 24px 40px;
            margin-top: 60px;
            font-size: 14px;
        }

        footer a {
            color: #94a3b8;
            text-decoration: none;
        }

        /* ── RESPONSIVE — mobile view ── */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 12px;
                padding: 16px 20px;
            }

            .nav-links {
                gap: 16px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR — appears on every page -->
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">ShopNow</a>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'product_list' %}">Products</a></li>
        </ul>
        <div class="nav-actions">
            <a href="#" class="btn-primary">Login</a>
        </div>
    </nav>

    <!-- MAIN CONTENT — each page fills this block -->
    {% block content %}
    {% endblock %}

    <!-- FOOTER — appears on every page -->
    <footer>
        <p>&copy; 2026 ShopNow. All rights reserved.</p>
    </footer>

</body>
</html>
