{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopNow{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- NAVBAR — appears on every page -->
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">ShopNow</a>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'product_list' %}">Products</a></li>
        </ul>
        <div class="nav-actions">
    {% if request.user.is_authenticated %}
        <span style="font-size:14px; color:#64748b;">
            Hello, {{ request.user.username }}
        </span>
        <a href="{% url 'add_product' %}" class="btn-primary">
            + Add Product
        </a>
        <a href="{% url 'logout' %}"
           style="font-size:14px; color:#64748b; text-decoration:none;">
            Logout
        </a>
    {% else %}
        <a href="{% url 'signup' %}"
           style="font-size:14px; color:#64748b; text-decoration:none;">
            Sign Up
        </a>
        <a href="{% url 'login' %}" class="btn-primary">Login</a>
    {% endif %}
</div>
    </nav>

    <!-- MAIN CONTENT — each page fills this block -->
    {% block content %}
    {% endblock %}

    <!-- FOOTER — appears on every page -->
    <footer>
        <p>&copy; 2026 ShopNow. All rights reserved.</p>
    </footer>

</body>
</html>
